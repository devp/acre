# Example configuration for the codereview tool.
# This file should be copied to ~/.config/acre.toml

# Default commands to run when no command is specified
default_commands = "status"

# In interactive mode, if you enter only positional args (e.g. "1 2 3"),
# acre can assume you meant to pass them to this command.
# Example: default_interact_command_for_args = "review"
# Example: default_interact_command_for_args = "review --todo"
# default_interact_command_for_args = "review"

[aliases]
# Example alias: `st` will be expanded to `status`
st = "status"
# If you want to get into interactive and always initialize a pull request:
i  = "interactive --auto-yes"
# Short aliases are useful for interactive mode.
lt = "ls --todo"
# Use whatever mnemonics work for you.
smol = "review --loc-lte 10"

# Include jira info to include URLs to tickets.
[jira]
base = "your-corp"

# Review behavior for test files.
[review]
# Opt in to make `review` behave as if `--test-diff-first` was passed.
# The CLI flag still takes precedence when explicitly provided.
test_diff_first_default = true
# Test file detection: matched against the file basename.
test_file_patterns = ["^test_", "_test(\\.[^.]+)?$"]
# Test diff filtering (grep -E): matched against changed lines (+/- prefixed).
test_diff_patterns = ["^[[:space:]]*(async[[:space:]]+def|def)[[:space:]]+test_"]
